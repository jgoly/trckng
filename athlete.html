<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="apple-mobile-web-app-title" content="trckng"/>
<title>trckng — athlete</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#ffffff;--bg2:#f7f6f3;--bg3:#f0ede8;
  --text:#1a1a1a;--text2:#6b6b6b;--text3:#9b9b9b;
  --border:rgba(0,0,0,0.1);--border2:rgba(0,0,0,0.2);
  --green:#27500A;--greenbg:#EAF3DE;--greenborder:#97C459;
  --yellow:#854F0B;--yellowbg:#FEFCE8;--yellowborder:#FDE047;
  --red:#791F1F;--redbg:#FCEBEB;--redborder:#F09595;
  --blue:#0C447C;--bluebg:#E6F1FB;
  --grey:#5F5E5A;--greybg:#F1EFE8;--greyborder:#B4B2A9;
  --radius:8px;--radius-lg:12px;
}
html,body{height:100%;overflow:hidden;background:var(--bg3);}
body{font-family:'DM Sans',sans-serif;color:var(--text);font-size:15px;}
.app{max-width:480px;margin:0 auto;height:100vh;display:flex;flex-direction:column;background:var(--bg3);overflow:hidden;}
.screen{display:none;flex-direction:column;flex:1;overflow:hidden;}
.screen.active{display:flex;}
.hdr{padding:14px 18px 12px;background:var(--bg);border-bottom:0.5px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.wm{font-family:'DM Mono',monospace;font-size:15px;font-weight:500;letter-spacing:-0.5px;color:var(--text);}
.wm-sub{font-size:10px;color:var(--text3);font-family:'DM Mono',monospace;letter-spacing:0.04em;margin-left:6px;text-transform:uppercase;}
.hdr-btns{display:flex;gap:8px;align-items:center;}
.hbtn{font-size:13px;color:var(--text2);cursor:pointer;padding:7px 14px;border:0.5px solid var(--border2);border-radius:var(--radius);background:none;font-family:'DM Sans',sans-serif;}
.hbtn:active{background:var(--bg2);}
.hbtn-primary{background:var(--text);color:#fff;border-color:var(--text);}
.hbtn-primary:active{opacity:0.85;}
.bbtn{font-size:14px;color:var(--text2);cursor:pointer;background:none;border:none;font-family:'DM Sans',sans-serif;padding:0;}
.htitle{font-size:14px;font-weight:500;color:var(--text);}
.nav{display:flex;background:var(--bg);border-top:0.5px solid var(--border);flex-shrink:0;padding-bottom:env(safe-area-inset-bottom,0px);}
.ni{flex:1;padding:11px 8px 10px;text-align:center;cursor:pointer;font-size:11px;color:var(--text3);border:none;background:none;font-family:'DM Sans',sans-serif;}
.ni.active{color:var(--text);font-weight:500;}
.ni-ic{font-size:16px;display:block;margin-bottom:2px;}
.con{flex:1;overflow-y:auto;padding:16px;-webkit-overflow-scrolling:touch;}
.lbl{font-size:11px;font-weight:500;color:var(--text2);letter-spacing:0.07em;text-transform:uppercase;margin-bottom:9px;display:block;}
.fs{margin-bottom:20px;}
.mo-lbl{font-size:11px;font-weight:500;color:var(--text3);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:9px;padding:0 2px;}

/* CARDS */
.sc{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:14px 16px;margin-bottom:9px;cursor:pointer;}
.sc-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:8px;}
.sc-meta{display:flex;align-items:center;gap:7px;}
.sdt{font-size:12px;color:var(--text2);}
.ttag{font-size:11px;font-weight:500;padding:3px 9px;border-radius:20px;}
.t-tr{background:#E6F1FB;color:#0C447C;}
.t-co{background:#FAECE7;color:#712B13;}
.t-sc{background:#EEEDFE;color:#3C3489;}
.t-rd{background:var(--greybg);color:var(--grey);}
.completed-line{font-size:12px;font-weight:500;color:var(--text);font-family:'DM Mono',monospace;margin-bottom:5px;line-height:1.4;}
.sn-preview{font-size:13px;color:var(--text2);line-height:1.6;margin-bottom:10px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.sn-full{font-size:13px;color:var(--text2);line-height:1.6;margin-bottom:10px;display:none;white-space:pre-wrap;}
.sc.expanded .sn-preview{display:none;}
.sc.expanded .sn-full{display:block;}
.sf{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.rpebadge{font-size:11px;font-weight:500;padding:3px 9px;border-radius:20px;}
.q45{background:var(--greenbg);color:var(--green);}
.q3{background:var(--yellowbg);color:var(--yellow);border:0.5px solid var(--yellowborder);}
.q12{background:var(--redbg);color:var(--red);}
.qrd{background:var(--greybg);color:var(--grey);}
.qsk{background:var(--bg2);color:var(--text3);}
.expand-hint{font-size:11px;color:var(--text3);margin-left:auto;}
.sc-detail{display:none;margin-top:12px;border-top:0.5px solid var(--border);padding-top:12px;}
.sc.expanded .sc-detail{display:block;}
.dr-table{width:100%;border-collapse:collapse;font-size:12px;font-family:'DM Mono',monospace;}
.dr-table th{font-size:10px;color:var(--text3);font-weight:500;text-align:left;padding:3px 6px 3px 0;letter-spacing:0.04em;text-transform:uppercase;font-family:'DM Sans',sans-serif;}
.dr-table td{padding:4px 6px 4px 0;color:var(--text2);border-bottom:0.5px solid var(--border);}
.dr-table tr:last-child td{border-bottom:none;}
.sc-acts{display:flex;gap:4px;margin-top:12px;border-top:0.5px solid var(--border);padding-top:9px;}
.ebtn{font-size:12px;color:var(--text2);background:none;border:none;cursor:pointer;padding:5px 9px;border-radius:var(--radius);font-family:'DM Sans',sans-serif;}
.ebtn:active{background:var(--bg2);}
.dbtn{font-size:12px;color:var(--red);background:none;border:none;cursor:pointer;padding:5px 9px;border-radius:var(--radius);font-family:'DM Sans',sans-serif;}
.dbtn:active{background:var(--redbg);}
.cdel{display:none;align-items:center;gap:8px;margin-top:9px;border-top:0.5px solid var(--border);padding-top:9px;flex-wrap:wrap;}
.cdel.show{display:flex;}
.cdel span{font-size:13px;color:var(--text2);}
.cdel button{font-size:12px;padding:5px 12px;border-radius:var(--radius);cursor:pointer;font-family:'DM Sans',sans-serif;border:0.5px solid var(--border2);background:none;color:var(--text2);}
.cdel .yes-del{background:var(--redbg);color:var(--red);border-color:var(--redborder);}

/* FORM */
.tsel{display:flex;gap:6px;}
.tbtn{flex:1;padding:10px 6px;border:0.5px solid var(--border);border-radius:var(--radius);background:var(--bg);font-size:13px;cursor:pointer;font-family:'DM Sans',sans-serif;color:var(--text2);text-align:center;}
.tbtn.sel{border-color:var(--border2);color:var(--text);background:var(--bg2);font-weight:500;}
.tbtn.rest-btn.sel{background:var(--greybg);color:var(--grey);border-color:var(--greyborder);}
.qsel{display:flex;gap:5px;}
.qsbtn{flex:1;padding:13px 4px;border-radius:var(--radius);border:0.5px solid var(--border);background:var(--bg);font-size:17px;font-weight:500;cursor:pointer;font-family:'DM Mono',monospace;color:var(--text2);text-align:center;}
.qsbtn.s1,.qsbtn.s2{background:var(--redbg);color:var(--red);border-color:var(--redborder);}
.qsbtn.s3{background:var(--yellowbg);color:var(--yellow);border-color:var(--yellowborder);}
.qsbtn.s4,.qsbtn.s5{background:var(--greenbg);color:var(--green);border-color:var(--greenborder);}
.qsbtn.skip{background:var(--bg2);color:var(--text3);border-color:var(--border);font-size:12px;font-family:'DM Sans',sans-serif;}
.q-hint{display:grid;grid-template-columns:2fr 1fr 2fr;font-size:11px;color:var(--text3);margin-top:6px;}
.q-hint span:last-child{text-align:right;}
.q-hint span:nth-child(2){text-align:center;}
.rpe-sub{font-size:11px;color:var(--text3);margin-top:4px;text-align:center;}
textarea{width:100%;padding:13px 14px;border:0.5px solid var(--border);border-radius:var(--radius);background:var(--bg);font-size:15px;font-family:'DM Sans',sans-serif;color:var(--text);resize:none;line-height:1.7;-webkit-appearance:none;overflow:hidden;min-height:52px;}
textarea:focus{outline:none;border-color:var(--border2);}
textarea::placeholder{color:var(--text3);}
.ifield{width:100%;padding:11px 13px;border:0.5px solid var(--border);border-radius:var(--radius);background:var(--bg);font-size:14px;font-family:'DM Sans',sans-serif;color:var(--text);margin-bottom:9px;-webkit-appearance:none;}
.ifield:focus{outline:none;border-color:var(--border2);}
.ifield::placeholder{color:var(--text3);}
.sbtn{width:100%;padding:15px;background:var(--text);color:#fff;border:none;border-radius:var(--radius);font-size:15px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;margin-top:8px;}
.sbtn:active{opacity:0.85;}
.arb{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius);padding:13px 14px;margin-bottom:9px;}
.rep-hdr{display:grid;grid-template-columns:22px 1fr 1fr 1fr 24px;gap:5px;margin-bottom:5px;}
.rep-hdr span{font-size:10px;color:var(--text3);letter-spacing:0.04em;text-transform:uppercase;}
.rep-row{display:grid;grid-template-columns:22px 1fr 1fr 1fr 24px;gap:5px;align-items:center;margin-bottom:5px;}
.rep-n{font-size:12px;color:var(--text3);font-family:'DM Mono',monospace;text-align:center;}
.ri{padding:9px 8px;border:0.5px solid var(--border);border-radius:var(--radius);background:var(--bg2);font-size:12px;font-family:'DM Mono',monospace;color:var(--text);width:100%;-webkit-appearance:none;}
.ri:focus{outline:none;border-color:var(--border2);}
.ri::placeholder{color:var(--text3);}
.add-rep{font-size:13px;color:var(--text2);background:none;border:0.5px dashed var(--border2);border-radius:var(--radius);padding:8px 13px;cursor:pointer;font-family:'DM Sans',sans-serif;width:100%;text-align:left;margin-top:5px;}
.add-rep:active{background:var(--bg2);}
.del-rep{font-size:15px;color:var(--text3);background:none;border:none;cursor:pointer;padding:0 2px;font-family:'DM Sans',sans-serif;line-height:1;text-align:center;}
.divider{height:0.5px;background:var(--border);margin:4px 0 20px;}
.draft-banner{background:var(--yellowbg);border:0.5px solid var(--yellowborder);border-radius:var(--radius);padding:10px 14px;margin-bottom:16px;font-size:13px;color:var(--yellow);display:flex;align-items:center;justify-content:space-between;}
.draft-clear{font-size:12px;color:var(--text3);background:none;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;padding:0;}

/* CALENDAR */
.cal-hdr{display:flex;align-items:center;justify-content:space-between;padding:4px 0 15px;}
.cal-mo{font-size:16px;font-weight:500;color:var(--text);}
.cal-nav{background:none;border:none;cursor:pointer;color:var(--text2);font-size:22px;padding:2px 10px;line-height:1;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;}
.cal-dl{font-size:11px;color:var(--text3);text-align:center;padding-bottom:6px;}
.cal-day{aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-size:13px;border-radius:50%;color:var(--text3);position:relative;flex-direction:column;}
.cal-day.hs{color:var(--text);font-weight:500;}
.cal-day.td{background:var(--bg2);}
.cdot{width:5px;height:5px;border-radius:50%;margin-top:1px;}
.cbadge{position:absolute;top:0;right:0;width:14px;height:14px;border-radius:50%;font-size:8px;display:flex;align-items:center;justify-content:center;font-weight:500;font-family:'DM Mono',monospace;background:var(--bluebg);color:var(--blue);}
.tcard{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:16px;margin-top:18px;}
.tcard-title{font-size:12px;color:var(--text2);margin-bottom:4px;}
.tcard-sub{font-size:11px;color:var(--text3);margin-bottom:16px;}
.tally-wrap{display:flex;gap:0;align-items:flex-end;height:80px;border-bottom:0.5px solid var(--border);padding:0 4px;margin-bottom:8px;}
.tbc{display:flex;flex-direction:column;align-items:center;justify-content:flex-end;gap:4px;flex:1;height:100%;}
.tbf{width:60%;border-radius:3px 3px 0 0;min-height:3px;}
.tbl{font-size:11px;color:var(--text3);margin-top:4px;}
.tbv{font-size:14px;font-weight:500;color:var(--text);}
.leg{display:flex;gap:12px;margin-top:12px;flex-wrap:wrap;}
.li{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text2);}
.ld{width:8px;height:8px;border-radius:50%;flex-shrink:0;}

/* PROFILE */
.profile-avatar{width:72px;height:72px;border-radius:50%;background:var(--bluebg);display:flex;align-items:center;justify-content:center;font-size:26px;font-weight:500;color:var(--blue);margin:0 auto 16px;}
.profile-name{font-size:20px;font-weight:500;text-align:center;color:var(--text);margin-bottom:4px;}
.profile-event{font-size:14px;color:var(--text2);text-align:center;margin-bottom:24px;}
.profile-stat-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;}
.profile-stat{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:14px 16px;}
.profile-stat-val{font-size:22px;font-weight:500;color:var(--text);font-family:'DM Mono',monospace;}
.profile-stat-lbl{font-size:11px;color:var(--text3);margin-top:3px;}
.privacy-notice{background:var(--greenbg);border:0.5px solid var(--greenborder);border-radius:var(--radius);padding:12px 14px;font-size:12px;color:var(--green);line-height:1.6;margin-bottom:16px;}
.profile-section{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:14px 16px;margin-bottom:10px;}
.profile-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:0.5px solid var(--border);font-size:13px;}
.profile-row:last-child{border-bottom:none;padding-bottom:0;}
.profile-row-lbl{color:var(--text2);}
.profile-row-val{color:var(--text);font-weight:500;}
.edit-profile-btn{width:100%;padding:12px;border:0.5px solid var(--border2);border-radius:var(--radius-lg);background:none;color:var(--text2);font-size:13px;cursor:pointer;font-family:'DM Sans',sans-serif;margin-bottom:10px;}
.edit-profile-btn:active{background:var(--bg2);}
.export-btn{width:100%;padding:12px;border:0.5px solid var(--border);border-radius:var(--radius-lg);background:none;color:var(--text3);font-size:13px;cursor:pointer;font-family:'DM Sans',sans-serif;}
.export-btn:active{background:var(--bg2);}

.empty{text-align:center;padding:60px 24px;color:var(--text2);font-size:14px;line-height:1.8;}
.empty strong{display:block;font-size:16px;color:var(--text);margin-bottom:8px;font-weight:500;}
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(8px);background:var(--text);color:#fff;padding:10px 20px;border-radius:var(--radius);font-size:13px;opacity:0;transition:all 0.25s;white-space:nowrap;pointer-events:none;z-index:999;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.session-count{font-size:11px;color:var(--text3);font-family:'DM Mono',monospace;}
</style>
  <meta property="og:type" content="website"/>
  <meta property="og:title" content="trckng — Athlete"/>
  <meta property="og:description" content="Your training diary. Log sessions, results and RPE. Private, simple, always in your pocket."/>
  <meta property="og:image" content="https://jgoly.github.io/trckng/og-image.png"/>
  <meta property="og:url" content="https://jgoly.github.io/trckng/athlete"/>
  <meta name="twitter:card" content="summary_large_image"/>
  <meta name="twitter:title" content="trckng — Athlete"/>
  <meta name="twitter:description" content="Your training diary. Log sessions, results and RPE. Private, simple, always in your pocket."/>
  <meta name="twitter:image" content="https://jgoly.github.io/trckng/og-image.png"/>
</head>
<body>
<div class="app" id="app">

  <!-- FEED -->
  <div class="screen active" id="screen-feed">
    <div class="hdr">
      <div style="display:flex;align-items:baseline;gap:0;">
        <span class="wm">trckng</span>
        <span class="wm-sub">athlete</span>
      </div>
      <div class="hdr-btns">
        <span class="session-count" id="session-count"></span>
        <button class="hbtn" onclick="go('quicklog')">Quick log</button>
        <button class="hbtn hbtn-primary" onclick="go('log')">+ Session</button>
      </div>
    </div>
    <div class="con" id="feed-con"></div>
    <div class="nav">
      <button class="ni active" id="nav-feed" onclick="nav('feed',this)"><span class="ni-ic">≡</span>Log</button>
      <button class="ni" id="nav-cal" onclick="nav('calendar',this)"><span class="ni-ic">▦</span>Calendar</button>
      <button class="ni" id="nav-profile" onclick="nav('profile',this)"><span class="ni-ic">◉</span>Profile</button>
    </div>
  </div>

  <!-- QUICK LOG -->
  <div class="screen" id="screen-quicklog">
    <div class="hdr"><button class="bbtn" onclick="go('feed')">← Back</button><span class="htitle">Quick log</span><div style="width:80px"></div></div>
    <div class="con">
      <div class="fs"><label class="lbl">Date</label><input class="ifield" id="ql-date" type="date"/></div>
      <div class="fs">
        <label class="lbl">Session type</label>
        <div class="tsel" id="ql-type-sel">
          <button class="tbtn sel" onclick="qlSelType(this,'Training')">Training</button>
          <button class="tbtn" onclick="qlSelType(this,'Competition')">Competition</button>
          <button class="tbtn" onclick="qlSelType(this,'S&C')">S&amp;C</button>
          <button class="tbtn rest-btn" onclick="qlSelType(this,'Rest')">Rest</button>
        </div>
      </div>
      <div class="fs" id="ql-rpe-wrap">
        <label class="lbl">RPE <span style="font-weight:400;text-transform:none;letter-spacing:0;font-size:11px;color:var(--text3)">— how hard did it feel?</span></label>
        <div class="qsel" id="ql-qsel">
          <button class="qsbtn" onclick="qlSelQ(this,1)">1</button>
          <button class="qsbtn" onclick="qlSelQ(this,2)">2</button>
          <button class="qsbtn" onclick="qlSelQ(this,3)">3</button>
          <button class="qsbtn" onclick="qlSelQ(this,4)">4</button>
          <button class="qsbtn" onclick="qlSelQ(this,5)">5</button>
          <button class="qsbtn skip" onclick="qlSelQ(this,null)">Skip</button>
        </div>
        <div class="q-hint"><span>Easy</span><span>Moderate</span><span>Max</span></div>
      </div>
      <button class="sbtn" onclick="saveQuickLog()">Save</button>
      <div style="height:24px"></div>
    </div>
  </div>

  <!-- CALENDAR -->
  <div class="screen" id="screen-calendar">
    <div class="hdr"><span class="wm">trckng</span><span class="wm-sub">athlete</span></div>
    <div class="con" id="cal-con"></div>
    <div class="nav">
      <button class="ni" onclick="nav('feed',this)"><span class="ni-ic">≡</span>Log</button>
      <button class="ni active" onclick="nav('calendar',this)"><span class="ni-ic">▦</span>Calendar</button>
      <button class="ni" onclick="nav('profile',this)"><span class="ni-ic">◉</span>Profile</button>
    </div>
  </div>

  <!-- PROFILE -->
  <div class="screen" id="screen-profile">
    <div class="hdr"><span class="wm">trckng</span><span class="wm-sub">athlete</span></div>
    <div class="con" id="profile-con"></div>
    <div class="nav">
      <button class="ni" onclick="nav('feed',this)"><span class="ni-ic">≡</span>Log</button>
      <button class="ni" onclick="nav('calendar',this)"><span class="ni-ic">▦</span>Calendar</button>
      <button class="ni active" onclick="nav('profile',this)"><span class="ni-ic">◉</span>Profile</button>
    </div>
  </div>

  <!-- EDIT PROFILE -->
  <div class="screen" id="screen-edit-profile">
    <div class="hdr"><button class="bbtn" onclick="go('profile')">← Profile</button><span class="htitle">Edit profile</span><div style="width:80px"></div></div>
    <div class="con">
      <div class="fs"><label class="lbl">Name</label><input class="ifield" id="ep-name" type="text" placeholder="Your name" autocomplete="off"/></div>
      <div class="fs"><label class="lbl">Sport</label><input class="ifield" id="ep-sport" type="text" placeholder="e.g. Athletics" autocomplete="off"/></div>
      <div class="fs"><label class="lbl">Event / discipline</label><input class="ifield" id="ep-event" type="text" placeholder="e.g. 400m hurdles" autocomplete="off"/></div>
      <div class="fs"><label class="lbl">Date of birth</label><input class="ifield" id="ep-dob" type="date"/></div>
      <button class="sbtn" onclick="saveProfile()">Save profile</button>
    </div>
  </div>

  <!-- LOG SESSION -->
  <div class="screen" id="screen-log">
    <div class="hdr"><button class="bbtn" onclick="go('feed')">← Back</button><span class="htitle" id="log-title">Log session</span><div style="width:80px"></div></div>
    <div class="con">
      <div id="draft-banner" class="draft-banner" style="display:none;">
        Draft restored <button class="draft-clear" onclick="clearDraft()">Clear</button>
      </div>
      <div class="fs"><label class="lbl">Date</label><input class="ifield" id="log-date" type="date" oninput="saveDraft()"/></div>
      <div class="fs">
        <label class="lbl">Session type</label>
        <div class="tsel" id="log-type-sel">
          <button class="tbtn sel" onclick="selType(this,'Training')">Training</button>
          <button class="tbtn" onclick="selType(this,'Competition')">Competition</button>
          <button class="tbtn" onclick="selType(this,'S&C')">S&amp;C</button>
          <button class="tbtn rest-btn" onclick="selType(this,'Rest')">Rest</button>
        </div>
      </div>
      <div id="session-detail-fields">
        <div class="fs">
          <label class="lbl">What I did</label>
          <textarea id="log-completed" rows="2" placeholder="e.g. 3×300m off 8 min recovery" oninput="autoResize(this);saveDraft()"></textarea>
        </div>
        <div id="results-wrap">
          <div class="fs">
            <label class="lbl">Results</label>
            <div class="arb" id="rep-block">
              <div class="rep-hdr" id="rep-hdr-row">
                <span></span><span id="col1-hdr">Result</span><span id="col2-hdr">Dist / time</span><span id="col3-hdr">Recovery</span><span></span>
              </div>
              <div id="rep-rows"></div>
              <button class="add-rep" onclick="addRep()">+ Add rep</button>
            </div>
          </div>
        </div>
        <div class="fs">
          <label class="lbl">My notes <span style="font-weight:400;text-transform:none;letter-spacing:0;font-size:11px;color:var(--text3)">— private, only you can see this</span></label>
          <textarea id="log-notes" rows="9" placeholder="How did it really feel? What clicked, what didn't? What are you thinking about? What do you want to remember from today?&#10;&#10;This is yours. Write honestly." oninput="autoResize(this);saveDraft()"></textarea>
        </div>
        <div class="fs">
          <label class="lbl">RPE <span style="font-weight:400;text-transform:none;letter-spacing:0;font-size:11px;color:var(--text3)">— how hard did it feel?</span></label>
          <div class="qsel" id="quality-sel">
            <button class="qsbtn" onclick="selQ(this,1)">1</button>
            <button class="qsbtn" onclick="selQ(this,2)">2</button>
            <button class="qsbtn" onclick="selQ(this,3)">3</button>
            <button class="qsbtn" onclick="selQ(this,4)">4</button>
            <button class="qsbtn" onclick="selQ(this,5)">5</button>
            <button class="qsbtn skip" onclick="selQ(this,null)">Skip</button>
          </div>
          <div class="q-hint"><span>Easy</span><span>Moderate</span><span>Max</span></div>
        </div>
      </div>
      <button class="sbtn" id="save-session-btn" onclick="saveSession()">Save session</button>
      <div style="height:24px"></div>
    </div>
  </div>

  <div class="toast" id="toast"></div>
  <div style="text-align:center;padding:10px 20px;background:var(--bg);border-top:0.5px solid var(--border);flex-shrink:0;padding-bottom:calc(env(safe-area-inset-bottom,0px) + 10px)"><a href="https://forms.gle/XjP8UC8WMBfvqgM29" target="_blank" style="font-size:12px;color:var(--text3);text-decoration:none;font-family:'DM Sans',sans-serif;">Found a bug? Let us know →</a></div>
</div>

<script>
const TAGCLS={Training:'t-tr',Competition:'t-co','S&C':'t-sc',Rest:'t-rd'};
const COLS={Training:['Result','Dist / time','Recovery'],Competition:['Result','Dist / time','Recovery'],'S&C':['Weight','Sets / reps','Rest']};
const CPH={Training:'e.g. 3×300m off 8 min recovery',Competition:'e.g. 60m H final — lane 4',S:'e.g. Power clean 4×3, back squat 4×5',Rest:''};

function qDot(q){return q===null||q===undefined?'#B4B2A9':q>=4?'#639922':q===3?'#EAB308':'#A32D2D';}
function qClass(q){return q===null||q===undefined?'qsk':q>=4?'q45':q===3?'q3':'q12';}
function qLabel(q){return q===null||q===undefined?'—':q+'/5';}

function ld(key,def){try{const v=localStorage.getItem(key);return v?JSON.parse(v):def;}catch(e){return def;}}
function sv(key,val){try{localStorage.setItem(key,JSON.stringify(val));}catch(e){}}

let sessions=ld('trckng_ath_sessions',[]);
let profile=ld('trckng_ath_profile',{name:'',sport:'',event:'',dob:''});
let calMonth=null;
let logState={type:'Training',quality:null,reps:[{a:'',b:'',c:''}],editId:null};
let qlState={type:'Training',quality:null};

function nav(name,btn){
  document.querySelectorAll('.ni').forEach(b=>b.classList.remove('active'));
  if(btn)btn.classList.add('active');
  go(name);
}

function go(name){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('screen-'+name).classList.add('active');
  if(name==='feed')renderFeed();
  if(name==='calendar')renderCal();
  if(name==='profile')renderProfile();
  if(name==='log')initLog();
  if(name==='quicklog')initQuickLog();
  if(name==='edit-profile')initEditProfile();
}

function autoResize(el){
  el.style.height='auto';
  el.style.height=el.scrollHeight+'px';
}

/* ---- DRAFT ---- */
function saveDraft(){
  const draft={
    date:document.getElementById('log-date').value,
    completed:document.getElementById('log-completed').value,
    notes:document.getElementById('log-notes').value,
    type:logState.type,
    quality:logState.quality,
    reps:logState.reps,
    editId:logState.editId,
    savedAt:new Date().toISOString()
  };
  sv('trckng_ath_draft',draft);
}

function clearDraft(){
  localStorage.removeItem('trckng_ath_draft');
  document.getElementById('draft-banner').style.display='none';
}

function loadDraft(){
  const d=ld('trckng_ath_draft',null);
  if(!d||d.editId)return null;
  const age=(new Date()-new Date(d.savedAt))/1000/60/60;
  if(age>24){localStorage.removeItem('trckng_ath_draft');return null;}
  return d;
}

/* ---- FEED ---- */
function renderFeed(){
  const c=document.getElementById('feed-con');
  const sc=document.getElementById('session-count');
  if(sc)sc.textContent=sessions.length?sessions.length+' sessions':'';
  if(!sessions.length){
    c.innerHTML='<div class="empty"><strong>No sessions yet</strong>Tap + Session or Quick log to get started.</div>';
    return;
  }
  const sorted=[...sessions].sort((a,b)=>b.date.localeCompare(a.date)||((b.savedAt||'').localeCompare(a.savedAt||'')));
  const grp={};
  sorted.forEach(s=>{
    const d=new Date(s.date+'T12:00:00');
    const k=d.toLocaleString('en-GB',{month:'long',year:'numeric'});
    if(!grp[k])grp[k]=[];
    grp[k].push(s);
  });
  let html='';
  Object.entries(grp).forEach(([mo,ss])=>{
    html+=`<div class="mo-lbl">${mo}</div>`;
    ss.forEach(s=>{
      const d=new Date(s.date+'T12:00:00');
      const ds=d.toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short'});
      const isRest=s.type==='Rest';
      const hasResults=(s.reps||[]).filter(r=>r.a||r.b||r.c).length>0;
      let detailHtml='';
      if(!isRest&&hasResults){
        const cols=COLS[s.type]||COLS['Training'];
        const reps=(s.reps||[]).filter(r=>r.a||r.b||r.c);
        detailHtml+=`<div style="margin-bottom:12px;"><table class="dr-table">
          <tr><th>#</th><th>${cols[0]}</th><th>${cols[1]}</th><th>${cols[2]}</th></tr>
          ${reps.map((r,i)=>`<tr><td>${i+1}</td><td>${r.a||'—'}</td><td>${r.b||'—'}</td><td>${r.c||'—'}</td></tr>`).join('')}
        </table></div>`;
      }
      const showExpand=!isRest&&(s.notes||detailHtml);
      html+=`<div class="sc" id="sc-${s.id}" onclick="${showExpand?'toggleCard('+s.id+')':''}">
        <div class="sc-top">
          <div class="sc-meta"><span class="sdt">${ds}</span></div>
          <span class="ttag ${TAGCLS[s.type]||'t-tr'}">${s.type}</span>
        </div>
        ${s.completed&&!isRest?`<div class="completed-line">${s.completed}</div>`:''}
        ${s.notes?`<div class="sn-preview">${s.notes}</div><div class="sn-full">${s.notes}</div>`:''}
        <div class="sf">
          ${!isRest?`<span class="rpebadge ${qClass(s.quality)}">RPE ${qLabel(s.quality)}</span>`:`<span class="rpebadge qrd">Rest</span>`}
          ${showExpand?`<span class="expand-hint">tap to expand</span>`:''}
        </div>
        ${showExpand?`<div class="sc-detail">${detailHtml}<div class="sc-acts">
          <button class="ebtn" onclick="event.stopPropagation();editSession(${s.id})">Edit</button>
          <button class="dbtn" onclick="event.stopPropagation();confirmDel(${s.id})">Delete</button>
        </div>
        <div class="cdel" id="cdel-${s.id}">
          <span>Delete this session?</span>
          <button class="yes-del" onclick="event.stopPropagation();doDelete(${s.id})">Yes, delete</button>
          <button onclick="event.stopPropagation();cancelDel(${s.id})">Cancel</button>
        </div></div>`:`<div class="sc-acts" style="margin-top:10px;border-top:0.5px solid var(--border);padding-top:9px;">
          <button class="ebtn" onclick="event.stopPropagation();editSession(${s.id})">Edit</button>
          <button class="dbtn" onclick="event.stopPropagation();confirmDel(${s.id})">Delete</button>
        </div>
        <div class="cdel" id="cdel-${s.id}">
          <span>Delete this session?</span>
          <button class="yes-del" onclick="event.stopPropagation();doDelete(${s.id})">Yes, delete</button>
          <button onclick="event.stopPropagation();cancelDel(${s.id})">Cancel</button>
        </div>`}
      </div>`;
    });
  });
  c.innerHTML=html;
}

function toggleCard(id){
  const el=document.getElementById('sc-'+id);
  if(!el)return;
  const hint=el.querySelector('.expand-hint');
  const wasExpanded=el.classList.contains('expanded');
  document.querySelectorAll('.sc.expanded').forEach(s=>{
    s.classList.remove('expanded');
    const h=s.querySelector('.expand-hint');
    if(h)h.textContent='tap to expand';
  });
  if(!wasExpanded){el.classList.add('expanded');if(hint)hint.textContent='tap to collapse';}
}

function confirmDel(id){document.getElementById('cdel-'+id).classList.add('show');}
function cancelDel(id){document.getElementById('cdel-'+id).classList.remove('show');}
function doDelete(id){
  sessions=sessions.filter(s=>s.id!==id);
  sv('trckng_ath_sessions',sessions);
  renderFeed();showToast('Session deleted');
}

function editSession(id){
  const s=sessions.find(x=>x.id===id);
  if(!s)return;
  logState={type:s.type,quality:s.quality===undefined?null:s.quality,reps:JSON.parse(JSON.stringify(s.reps||[{a:'',b:'',c:''}])),editId:id};
  go('log');
  setTimeout(()=>{
    document.getElementById('log-date').value=s.date;
    document.getElementById('log-completed').value=s.completed||'';
    document.getElementById('log-notes').value=s.notes||'';
    document.getElementById('log-title').textContent='Edit session';
    document.getElementById('save-session-btn').textContent='Update session';
    document.getElementById('draft-banner').style.display='none';
    syncTypeBtns('log-type-sel',s.type);
    syncQBtns('quality-sel',s.quality===undefined?null:s.quality);
    toggleRestFields(s.type==='Rest');
    updateRepCols(s.type);
    renderRepRows();
    const ta1=document.getElementById('log-completed');
    const ta2=document.getElementById('log-notes');
    if(ta1&&ta1.value)autoResize(ta1);
    if(ta2&&ta2.value)autoResize(ta2);
  },50);
}

/* ---- QUICK LOG ---- */
function initQuickLog(){
  const t=new Date();
  document.getElementById('ql-date').value=todayStr();
  qlState={type:'Training',quality:null};
  syncTypeBtns('ql-type-sel','Training');
  syncQBtns('ql-qsel',null);
  document.getElementById('ql-rpe-wrap').style.display='block';
}

function qlSelType(btn,val){
  qlState.type=val;
  syncTypeBtns('ql-type-sel',val);
  document.getElementById('ql-rpe-wrap').style.display=val==='Rest'?'none':'block';
}

function qlSelQ(btn,n){
  qlState.quality=n;
  syncQBtns('ql-qsel',n);
}

function saveQuickLog(){
  const date=document.getElementById('ql-date').value;
  if(!date){showToast('Pick a date first');return;}
  sessions.unshift({id:Date.now(),date,type:qlState.type,completed:'',notes:'',reps:[],quality:qlState.type==='Rest'?null:qlState.quality,savedAt:new Date().toISOString()});
  sv('trckng_ath_sessions',sessions);
  showToast('Saved');
  setTimeout(()=>nav('feed',document.getElementById('nav-feed')),600);
}

/* ---- CALENDAR ---- */
function renderCal(){
  const c=document.getElementById('cal-con');
  const now=new Date();
  if(!calMonth)calMonth={year:now.getFullYear(),month:now.getMonth()};
  const {year,month}=calMonth;
  const moName=new Date(year,month,1).toLocaleString('en-GB',{month:'long',year:'numeric'});
  const firstDay=(new Date(year,month,1).getDay()+6)%7;
  const dim=new Date(year,month+1,0).getDate();
  const isCurrentMonth=now.getFullYear()===year&&now.getMonth()===month;
  const todayDate=now.getDate();
  const dayS={};
  sessions.forEach(s=>{
    const d=new Date(s.date+'T12:00:00');
    if(d.getFullYear()===year&&d.getMonth()===month){
      const day=d.getDate();
      if(!dayS[day])dayS[day]=[];
      dayS[day].push(s);
    }
  });
  let g45=0,g3=0,g12=0,gSkip=0,gRest=0,tot=0;
  sessions.forEach(s=>{
    const d=new Date(s.date+'T12:00:00');
    if(d.getFullYear()===year&&d.getMonth()===month){
      tot++;
      if(s.type==='Rest')gRest++;
      else if(s.quality===null||s.quality===undefined)gSkip++;
      else if(s.quality>=4)g45++;
      else if(s.quality===3)g3++;
      else g12++;
    }
  });
  const workSessions=tot-gRest;
  const scoredSessions=workSessions-gSkip;
  const mx=Math.max(g45,g3,g12,1);
  const scale=60;
  const h45=g45?Math.max(Math.round((g45/mx)*scale),4):0;
  const h3=g3?Math.max(Math.round((g3/mx)*scale),4):0;
  const h12=g12?Math.max(Math.round((g12/mx)*scale),4):0;
  let html=`<div class="cal-hdr"><button class="cal-nav" onclick="prevMonth()">&#8249;</button><span class="cal-mo">${moName}</span><button class="cal-nav" onclick="nextMonth()">&#8250;</button></div><div class="cal-grid">`;
  ['M','T','W','T','F','S','S'].forEach(d=>html+=`<div class="cal-dl">${d}</div>`);
  for(let i=0;i<firstDay;i++)html+=`<div class="cal-day"></div>`;
  for(let d=1;d<=dim;d++){
    const ss=dayS[d]||[];
    const isToday=isCurrentMonth&&d===todayDate;
    let inner=`${d}`;
    if(ss.length===1){const col=ss[0].type==='Rest'?'#B4B2A9':qDot(ss[0].quality);inner+=`<div class="cdot" style="background:${col}"></div>`;}
    else if(ss.length>1)inner+=`<div class="cbadge">${ss.length}</div>`;
    html+=`<div class="cal-day${ss.length?' hs':''}${isToday?' td':''}">${inner}</div>`;
  }
  html+=`</div><div class="tcard"><div class="tcard-title">RPE — ${moName}</div><div class="tcard-sub">${workSessions} session${workSessions!==1?'s':''} logged${gRest?` · ${gRest} rest day${gRest!==1?'s':''}`:''}</div>`;
  if(scoredSessions>0){
    html+=`<div class="tally-wrap"><div class="tbc"><div class="tbv">${g45}</div><div class="tbf" style="height:${h45}px;background:#639922;"></div><div class="tbl">4–5</div></div><div class="tbc"><div class="tbv">${g3}</div><div class="tbf" style="height:${h3}px;background:#EAB308;"></div><div class="tbl">3</div></div><div class="tbc"><div class="tbv">${g12}</div><div class="tbf" style="height:${h12}px;background:#A32D2D;"></div><div class="tbl">1–2</div></div></div>`;
  } else {
    html+=`<div style="text-align:center;padding:16px 0;color:var(--text3);font-size:13px;">No scored sessions this month</div>`;
  }
  html+=`</div><div class="leg"><div class="li"><div class="ld" style="background:#639922"></div>4–5 Max effort</div><div class="li"><div class="ld" style="background:#EAB308"></div>3 Moderate</div><div class="li"><div class="ld" style="background:#A32D2D"></div>1–2 Easy</div><div class="li"><div class="ld" style="background:#B4B2A9"></div>Rest</div><div class="li"><div class="ld" style="background:var(--bluebg);border:1px solid var(--blue)"></div>Multi</div></div>`;
  c.innerHTML=html;
}

function prevMonth(){if(!calMonth){const n=new Date();calMonth={year:n.getFullYear(),month:n.getMonth()};}calMonth.month--;if(calMonth.month<0){calMonth.month=11;calMonth.year--;}renderCal();}
function nextMonth(){if(!calMonth){const n=new Date();calMonth={year:n.getFullYear(),month:n.getMonth()};}calMonth.month++;if(calMonth.month>11){calMonth.month=0;calMonth.year++;}renderCal();}

/* ---- PROFILE ---- */
function renderProfile(){
  const c=document.getElementById('profile-con');
  const p=profile;
  const initials=p.name?p.name.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2):'?';
  const age=p.dob?Math.floor((new Date()-new Date(p.dob))/(365.25*24*3600*1000)):'';
  const totalSessions=sessions.filter(s=>s.type!=='Rest').length;
  const restDays=sessions.filter(s=>s.type==='Rest').length;
  const scored=sessions.filter(s=>s.quality!==null&&s.quality!==undefined&&s.type!=='Rest');
  const avgRpe=scored.length?Math.round((scored.reduce((a,s)=>a+s.quality,0)/scored.length)*10)/10:'—';
  let html=`<div class="profile-avatar">${initials}</div>`;
  if(p.name)html+=`<div class="profile-name">${p.name}</div>`;
  if(p.sport||p.event)html+=`<div class="profile-event">${[p.sport,p.event].filter(Boolean).join(' · ')}</div>`;
  html+=`<div class="profile-stat-row">
    <div class="profile-stat"><div class="profile-stat-val">${totalSessions}</div><div class="profile-stat-lbl">Sessions logged</div></div>
    <div class="profile-stat"><div class="profile-stat-val">${avgRpe}</div><div class="profile-stat-lbl">Average RPE</div></div>
  </div>`;
  html+=`<div class="privacy-notice">Your notes are private and stored only on this device. Nobody else can see what you write.</div>`;
  if(p.name||p.sport||p.event||p.dob){
    html+=`<div class="profile-section">`;
    if(p.name)html+=`<div class="profile-row"><span class="profile-row-lbl">Name</span><span class="profile-row-val">${p.name}</span></div>`;
    if(p.sport)html+=`<div class="profile-row"><span class="profile-row-lbl">Sport</span><span class="profile-row-val">${p.sport}</span></div>`;
    if(p.event)html+=`<div class="profile-row"><span class="profile-row-lbl">Event</span><span class="profile-row-val">${p.event}</span></div>`;
    if(age)html+=`<div class="profile-row"><span class="profile-row-lbl">Age</span><span class="profile-row-val">${age}</span></div>`;
    html+=`</div>`;
  }
  html+=`<button class="edit-profile-btn" onclick="go('edit-profile')">${p.name?'Edit profile':'Set up profile'}</button>`;
  html+=`<button class="export-btn" onclick="exportData()">Export data (JSON backup)</button>`;
  c.innerHTML=html;
}

function initEditProfile(){
  document.getElementById('ep-name').value=profile.name||'';
  document.getElementById('ep-sport').value=profile.sport||'';
  document.getElementById('ep-event').value=profile.event||'';
  document.getElementById('ep-dob').value=profile.dob||'';
}

function saveProfile(){
  profile={
    name:document.getElementById('ep-name').value.trim(),
    sport:document.getElementById('ep-sport').value.trim(),
    event:document.getElementById('ep-event').value.trim(),
    dob:document.getElementById('ep-dob').value
  };
  sv('trckng_ath_profile',profile);
  showToast('Profile saved');
  setTimeout(()=>go('profile'),600);
}

/* ---- LOG FORM ---- */
function initLog(){
  if(logState.editId)return;
  const draft=loadDraft();
  if(draft){
    logState={type:draft.type,quality:draft.quality,reps:draft.reps||[{a:'',b:'',c:''}],editId:null};
    document.getElementById('log-date').value=draft.date||todayStr();
    document.getElementById('log-completed').value=draft.completed||'';
    document.getElementById('log-notes').value=draft.notes||'';
    document.getElementById('log-title').textContent='Log session';
    document.getElementById('save-session-btn').textContent='Save session';
    document.getElementById('draft-banner').style.display='flex';
    syncTypeBtns('log-type-sel',draft.type);
    syncQBtns('quality-sel',draft.quality);
    toggleRestFields(draft.type==='Rest');
    updateRepCols(draft.type);
    setTimeout(()=>{
      const ta1=document.getElementById('log-completed');
      const ta2=document.getElementById('log-notes');
      if(ta1&&ta1.value)autoResize(ta1);
      if(ta2&&ta2.value)autoResize(ta2);
    },50);
  } else {
    document.getElementById('log-date').value=todayStr();
    document.getElementById('log-completed').value='';
    document.getElementById('log-notes').value='';
    document.getElementById('log-completed').placeholder=CPH['Training'];
    document.getElementById('log-title').textContent='Log session';
    document.getElementById('save-session-btn').textContent='Save session';
    document.getElementById('draft-banner').style.display='none';
    logState={type:'Training',quality:null,reps:[{a:'',b:'',c:''}],editId:null};
    syncTypeBtns('log-type-sel','Training');
    syncQBtns('quality-sel',null);
    toggleRestFields(false);
    updateRepCols('Training');
  }
  renderRepRows();
}

function todayStr(){
  const t=new Date();
  return `${t.getFullYear()}-${String(t.getMonth()+1).padStart(2,'0')}-${String(t.getDate()).padStart(2,'0')}`;
}

function syncTypeBtns(selId,val){
  const sel=document.getElementById(selId);
  if(!sel)return;
  sel.querySelectorAll('.tbtn').forEach(b=>{
    b.classList.remove('sel');
    const m=b.getAttribute('onclick').match(/'([^']+)'/);
    if(m&&m[1]===val)b.classList.add('sel');
  });
}

function syncQBtns(selId,n){
  const sel=document.getElementById(selId);
  if(!sel)return;
  sel.querySelectorAll('.qsbtn').forEach(b=>{
    const isSkip=b.textContent.trim()==='Skip';
    b.className='qsbtn'+(isSkip?' skip':'');
  });
  if(n===null||n===undefined)return;
  const btns=Array.from(sel.querySelectorAll('.qsbtn:not(.skip)'));
  if(btns[n-1])btns[n-1].classList.add('s'+n);
}

function toggleRestFields(isRest){
  const detail=document.getElementById('session-detail-fields');
  if(detail)detail.style.display=isRest?'none':'block';
}

function updateRepCols(type){
  const cols=COLS[type]||COLS['Training'];
  const c1=document.getElementById('col1-hdr');
  const c2=document.getElementById('col2-hdr');
  const c3=document.getElementById('col3-hdr');
  if(c1)c1.textContent=cols[0];
  if(c2)c2.textContent=cols[1];
  if(c3)c3.textContent=cols[2];
}

function renderRepRows(){
  const c=document.getElementById('rep-rows');
  if(!c)return;
  c.innerHTML=logState.reps.map((rep,i)=>`
    <div class="rep-row">
      <div class="rep-n">${i+1}</div>
      <input class="ri" type="text" placeholder="—" value="${rep.a||''}" oninput="ur(${i},'a',this.value);saveDraft()"/>
      <input class="ri" type="text" placeholder="—" value="${rep.b||''}" oninput="ur(${i},'b',this.value);saveDraft()"/>
      <input class="ri" type="text" placeholder="—" value="${rep.c||''}" oninput="ur(${i},'c',this.value);saveDraft()"/>
      <button class="del-rep" onclick="delRep(${i})">×</button>
    </div>`).join('');
}

function ur(i,f,v){if(logState.reps[i])logState.reps[i][f]=v;}
function addRep(){logState.reps.push({a:'',b:'',c:''});renderRepRows();}
function delRep(i){
  if(logState.reps.length>1){logState.reps.splice(i,1);renderRepRows();}
  else showToast('Need at least one row');
}

function selType(btn,val){
  logState.type=val;
  syncTypeBtns('log-type-sel',val);
  const ph=document.getElementById('log-completed');
  if(ph)ph.placeholder=val==='S&C'?CPH['S']:CPH[val]||CPH['Training'];
  toggleRestFields(val==='Rest');
  updateRepCols(val);
  saveDraft();
}

function selQ(btn,n){
  logState.quality=n;
  syncQBtns('quality-sel',n);
  saveDraft();
}

function saveSession(){
  const date=document.getElementById('log-date').value;
  if(!date){showToast('Pick a date first');return;}
  const isRest=logState.type==='Rest';
  const session={
    id:logState.editId||Date.now(),
    date,type:logState.type,
    completed:isRest?'':document.getElementById('log-completed').value.trim(),
    notes:isRest?'':document.getElementById('log-notes').value.trim(),
    reps:isRest?[]:JSON.parse(JSON.stringify(logState.reps)),
    quality:isRest?null:logState.quality,
    savedAt:new Date().toISOString()
  };
  if(logState.editId){
    const idx=sessions.findIndex(s=>s.id===logState.editId);
    if(idx>-1)sessions[idx]=session;else sessions.unshift(session);
  } else {
    sessions.unshift(session);
  }
  sv('trckng_ath_sessions',sessions);
  clearDraft();
  const wasEdit=!!logState.editId;
  logState={type:'Training',quality:null,reps:[{a:'',b:'',c:''}],editId:null};
  showToast(wasEdit?'Session updated':'Session saved');
  setTimeout(()=>nav('feed',document.getElementById('nav-feed')),700);
}

function exportData(){
  const data={profile,sessions,exportedAt:new Date().toISOString()};
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download=`trckng-athlete-backup-${new Date().toISOString().slice(0,10)}.json`;
  a.click();URL.revokeObjectURL(url);
  showToast('Data exported');
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2200);
}

if(!profile.name)setTimeout(()=>go('edit-profile'),300);
else renderFeed();
</script>

</body>
</html>
